<?xml version="1.0" encoding="UTF-8"?>
<!-- Dense wave pattern for section backgrounds. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" preserveAspectRatio="none">
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M -50,40 Q 150,10 300,40 T 600,40 T 900,40 T 1200,40 T 1650,40" stroke="#DD1D21" opacity="0.5"/>
    <path d="M -50,70 Q 150,40 300,70 T 600,70 T 900,70 T 1200,70 T 1650,70" stroke="#FBCE07" opacity="0.4"/>
    <path d="M -50,100 Q 150,70 300,100 T 600,100 T 900,100 T 1200,100 T 1650,100" stroke="#DD1D21" opacity="0.35"/>
    <path d="M -50,130 Q 150,100 300,130 T 600,130 T 900,130 T 1200,130 T 1650,130" stroke="#FBCE07" opacity="0.3"/>
    <path d="M -50,160 Q 150,130 300,160 T 600,160 T 900,160 T 1200,160 T 1650,160" stroke="#DD1D21" opacity="0.25"/>
  </g>
</svg>
